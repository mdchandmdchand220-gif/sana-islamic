<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Time</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f9f4;
    margin:0;
    padding:20px;
}

.card{
    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    padding:20px;
}

h2{
    text-align:center;
    color:green;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:green;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f7f7f7;
}
</style>
</head>

<body>

<div class="card">

<h2>🕌 Prayer Time</h2>

<table>

<tr>
<th>Namaz</th>
<th>Time</th>
</tr>

<tr>
<td>🌅 Fajr</td>
<td>05:00 AM</td>
</tr>

<tr>
<td>☀️ Dhuhr</td>
<td>12:30 PM</td>
</tr>

<tr>
<td>🌤 Asr</td>
<td>04:15 PM</td>
</tr>

<tr>
<td>🌇 Maghrib</td>
<td>06:55 PM</td>
</tr>

<tr>
<td>🌙 Isha</td>
<td>08:15 PM</td>
</tr>

</table>

</div>

</body>
</html>
