<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qibla Finder</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f9f4;
    text-align:center;
    padding:20px;
}

.card{
    max-width:450px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

button{
    background:green;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    color:#006400;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h2>🕋 Qibla Finder</h2>

<button onclick="findQibla()">Find Qibla</button><h3 id="location">📍 Location: --</h3>

<div id="compass" style="font-size:90px;transition:0.5s;">🧭</div>

<h3 id="degree">Qibla Direction: --</h3>

<div id="result"></div>

</div>


<div id="result"></div>

</div>



<script>
function findQibla() {

  navigator.geolocation.getCurrentPosition(

    function(pos) {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;document.getElementById("location").innerHTML =
"📍 Location: " + lat.toFixed(4) + ", " + lon.toFixed(4);


      let kaabaLat = 21.4225;
      let kaabaLon = 39.8262;

      let dLon = (kaabaLon - lon) * Math.PI / 180;

      lat = lat * Math.PI / 180;
      kaabaLat = kaabaLat * Math.PI / 180;

      let y = Math.sin(dLon);

      let x = Math.cos(lat) * Math.tan(kaabaLat)
            - Math.sin(lat) * Math.cos(dLon);

      let brng = Math.atan2(y, x);

      brng = brng * 180 / Math.PI;

      brng = (brng + 360) % 360;document.getElementById("location").innerHTML =
"📍 Location: " + lat.toFixed(4) + ", " + lon.toFixed(4);


      document.getElementById("result").innerHTML =
        "🕋 Qibla Direction: <b>" + brng.toFixed(2) + "°</b>";

    },

    function() {
      alert("Location Permission Allow करें");
    }

  );

}

</script>

</body>
</html>
