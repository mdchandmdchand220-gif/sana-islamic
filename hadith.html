<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadith</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📚 Hadith</h1>
    <p>40 Hadith Collection</p>
</header>

<div class="container" id="hadith-container">
</div>

<a class="btn" href="index.html">⬅ Back Home</a>

<script>
fetch("hadith.json")
.then(response => {
    alert("JSON Loaded");
    return response.json();
})
then(data=>{
   let container = document.getElementById("hadith-container");

    data.forEach(hadith => {

        container.innerHTML += `
        <div class="card">
            <h2>${hadith.title}</h2>
            <p><b>${hadith.text}</b></p>
            <p>📖 ${hadith.source}</p>
        </div>
        `;

    });

});
</script>

</body>
</html>
