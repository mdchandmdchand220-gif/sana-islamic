<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>पारा 2 - सयक़ूल</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h2{
text-align:center;
color:#006400;
}

.ayah{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.arabic{
font-size:28px;
direction:rtl;
text-align:right;
line-height:2;
}

.hindi{
font-size:18px;
margin-top:10px;
line-height:1.8;
}

.number{
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<h2>पारा 2 - सयक़ूल</h2>

<div id="content">
डेटा लोड हो रहा है...
</div>

<script>

Promise.all([
fetch("https://api.alquran.cloud/v1/surah/2/quran-simple").then(r=>r.json()),
fetch("https://api.alquran.cloud/v1/surah/2/hi.farooq").then(r=>r.json())
])

.then(([arabic,hindi])=>{

let html="";

let ar=arabic.data.ayahs;
let hi=hindi.data.ayahs;
for(let i=141;i<252;i++){

html += `
<div class="ayah">

<div class="arabic">
${ar[i].text}
</div>

<div class="hindi">
<span class="number">
आयत ${i+1}
</span>
<br><br>
${hi[i].text}
</div>

</div>
`;

}

document.getElementById("content").innerHTML = html;

})

.catch(error=>{

document.getElementById("content").innerHTML =
"<h3 style='color:red;text-align:center;'>डेटा लोड करने में समस्या आई। कृपया इंटरनेट कनेक्शन जाँचें।</h3>";

console.error(error);

});
</script>

</body>
</html>
