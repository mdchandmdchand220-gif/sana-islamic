<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>पारा 7 - وإذا سمعوا</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h2{
text-align:center;
color:#006400;
}

.ayah{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.arabic{
font-size:28px;
direction:rtl;
text-align:right;
line-height:2;
}

.hindi{
font-size:18px;
margin-top:10px;
line-height:1.8;
}

.number{
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<h2>पारा 7 - وإذا سمعوا</h2>

<div id="content">
डेटा लोड हो रहा है...
</div>

<script>

Promise.all([
fetch("https://api.alquran.cloud/v1/surah/5/quran-simple").then(r=>r.json()),
fetch("https://api.alquran.cloud/v1/surah/5/hi.farooq").then(r=>r.json()),
fetch("https://api.alquran.cloud/v1/surah/6/quran-simple").then(r=>r.json()),
fetch("https://api.alquran.cloud/v1/surah/6/hi.farooq").then(r=>r.json())
])

.then(([maidahAr,maidahHi,anamAr,anamHi])=>{

let html="";

let ar1=maidahAr.data.ayahs;
let hi1=maidahHi.data.ayahs;

let ar2=anamAr.data.ayahs;
let hi2=anamHi.data.ayahs;
// सूरह अल-माइदह (आयत 82–120)
for(let i=81;i<120;i++){

html += `
<div class="ayah">

<div class="arabic">
${ar1[i].text}
</div>

<div class="hindi">
<span class="number">
सूरह अल-माइदह : आयत ${i+1}
</span>
<br><br>
${hi1[i].text}
</div>

</div>
`;

}

// सूरह अल-अनआम (आयत 1–110)
for(let i=0;i<110;i++){

html += `
<div class="ayah">

<div class="arabic">
${ar2[i].text}
</div>

<div class="hindi">
<span class="number">
सूरह अल-अनआम : आयत ${i+1}
</span>
<br><br>
${hi2[i].text}
</div>

</div>
`;

}

document.getElementById("content").innerHTML = html;

})

.catch(error=>{

document.getElementById("content").innerHTML =
"<h3 style='color:red;text-align:center;'>डेटा लोड करने में समस्या आई। कृपया इंटरनेट कनेक्शन जाँचें।</h3>";

console.error(error);

});
</script>

</body>
</html>
